pre-push:
  parallel: false  # fmt → build → lint must run in order
  commands:
    fmt:
      glob: "**/*.go"
      run: gofmt -w .
    build:
      glob: "**/*.go"
      run: go build ./...
    test:
      glob: "**/*.go"
      run: go test ./...
    lint:
      glob: "**/*.go"
      run: golangci-lint run ./...
