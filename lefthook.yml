pre-push:
  parallel: false  # fmt → build → lint → test → coverage must run in order
  commands:
    fmt:
      glob: "**/*.go"
      run: gofmt -w .
    build:
      glob: "**/*.go"
      run: go build ./...
    test:
      glob: "**/*.go"
      run: go test -coverprofile=coverage.out ./internal/git ./internal/store
    coverage:
      glob: "**/*.go"
      run: go tool cover -html=coverage.out -o coverage.html && echo "✓ Coverage report generated: coverage.html"
    lint:
      glob: "**/*.go"
      run: golangci-lint run ./...
