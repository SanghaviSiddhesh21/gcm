pre-push:
  parallel: false  # fmt → build → test → coverage-check → lint must run in order
  commands:
    fmt:
      glob: "**/*.go"
      run: gofmt -w .
    build:
      glob: "**/*.go"
      run: go build ./...
    test:
      glob: "**/*.go"
      run: make test
    coverage-check:
      glob: "**/*.go"
      run: make coverage-check
    lint:
      glob: "**/*.go"
      run: golangci-lint run ./...
