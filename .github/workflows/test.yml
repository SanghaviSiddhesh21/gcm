name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Check coverage
        run: |
          go test -coverprofile=coverage.out ./internal/store/... ./internal/git/...
          go tool cover -func=coverage.out | grep ^total | awk '{
            gsub(/%/, "", $3)
            if ($3+0 < 90) {
              print "Coverage " $3 "% is below the 90% threshold"
              exit 1
            } else {
              print "Coverage " $3 "% meets the 90% threshold"
            }
          }'
