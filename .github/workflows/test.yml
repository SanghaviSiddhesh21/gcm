name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Check coverage
        run: |
          go test -coverprofile=coverage.out ./internal/store/... ./internal/git/... ./internal/config/... ./internal/ai/...
          go tool cover -func=coverage.out | grep ^total | awk '{
            gsub(/%/, "", $3)
            if ($3+0 < 80) {
              print "Coverage " $3 "% is below the 80% threshold"
              exit 1
            } else {
              print "Coverage " $3 "% meets the 80% threshold"
            }
          }'
