# https://github.com/vladopajic/go-test-coverage

profile: coverage.out

threshold:
  # Ratchet — only increase, never decrease. Update after adding tests.
  # Lowered from 67 → 58 after the telemetry feature (v0.1.10): the feature
  # added new command-runner functions (runCategories, runAssign, etc.) that
  # are exempt from unit tests per the testing contract and are covered only
  # by binary integration tests, which do not feed into coverage.out.
  # See DECISIONS.md "Coverage threshold lowered after telemetry feature".
  total: 58

exclude:
  paths:
    # TUI — requires a real terminal; untestable without one.
    - internal/ui/

    # OS-specific exec wrappers — security logic is tested separately in logic_test.go.
    - cmd/passthrough_unix\.go
    - cmd/passthrough_windows\.go

    # Thin HTTP POST wrapper for telemetry — no branching logic; integration-tested
    # via mock poster injection in telemetry_test.go. See DECISIONS.md "HTTP transport
    # isolated in telemetry/http.go".
    - internal/telemetry/http\.go
