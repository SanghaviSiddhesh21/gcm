version: "2"

linters:
  enable:
    - govet        # shadowed vars, printf mismatches
    - errcheck     # unhandled errors
    - staticcheck  # comprehensive static analysis (includes gosimple in v2)
    - ineffassign  # assignments whose value is never used
    - misspell     # spelling mistakes in comments/strings
    - gosec        # security issues
    - unconvert    # unnecessary type conversions
    - prealloc     # slice pre-allocation suggestions
    - revive       # style checks

  settings:
    gosec:
      excludes:
        - G204  # subprocess launched with variable — expected in a git wrapper CLI
        - G304  # file path from variable — path is always .git/gcm.json, not user input
    errcheck:
      exclude-functions:
        - (github.com/fatih/color.Color).Print
        - (github.com/fatih/color.Color).Printf
        - (github.com/fatih/color.Color).Println  # color print errors are universally ignored in CLIs
    revive:
      rules:
        - name: exported
          disabled: true  # don't require godoc on every exported symbol

formatters:
  enable:
    - gofmt        # enforces standard Go formatting

issues:
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
